<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ход · чёрный минимализм</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .auth-frame {
            max-width: 400px;
            width: 100%;
            background: #0c0c10;
            border-radius: 44px;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            padding: 32px 24px 36px 24px;
            transition: all 0.2s ease;
        }

        .logo-area {
            margin-bottom: 40px;
            text-align: left;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .logo-sub {
            color: #77777a;
            font-size: 14px;
            font-weight: 400;
        }

        .tab-switch {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid #222225;
            padding-bottom: 2px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #66666a;
            font-size: 17px;
            font-weight: 500;
            padding: 8px 0 10px 0;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            letter-spacing: -0.2px;
        }

        .tab-btn.active {
            color: #ffffff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ffffff;
            border-radius: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 16px;
        }

        .hidden-form {
            display: none !important;
        }

        .input-field {
            width: 100%;
            background: #151518;
            border: 1px solid #27272b;
            border-radius: 18px;
            padding: 18px 20px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
        }

        .input-field:focus {
            border-color: #505054;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.03);
            transform: scale(1.01);
        }

        .input-field::placeholder {
            color: #4a4a50;
            font-weight: 400;
        }

        .input-field.error {
            border-color: #a33c3c;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        .action-btn {
            background: #ffffff;
            border: none;
            border-radius: 22px;
            padding: 18px 24px;
            color: #000000;
            font-weight: 600;
            font-size: 17px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 6px;
            letter-spacing: -0.2px;
            position: relative;
            overflow: hidden;
        }

        .action-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.3s ease-out;
        }

        .action-btn:active::after {
            transform: translate(-50%, -50%) scale(2);
            opacity: 0;
        }

        .message-block {
            margin-top: 24px;
            padding: 16px 18px;
            background: #0f0f13;
            border: 1px solid #232327;
            border-radius: 24px;
            color: #c0c0c8;
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
            min-height: 60px;
            transition: background 0.3s, border-color 0.3s;
        }

        .message-block.success {
            background: #1a1a1f;
            border-color: #3a3a44;
            color: #e0e0e8;
        }

        .terms-hint {
            text-align: center;
            color: #4a4a50;
            font-size: 12px;
            margin-top: 28px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .terms-hint:active {
            color: #7a7a80;
            transform: scale(0.98);
        }

        /* скип выглядит как обычный текст, но с анимацией */
        .skip-text {
            color: #4a4a50;
            font-size: 12px;
            margin-top: 28px;
            text-align: center;
            transition: color 0.2s, transform 0.1s;
            cursor: pointer;
            display: inline-block;
            width: 100%;
        }

        .skip-text:active {
            color: #7a7a80;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="auth-frame">
        <div class="logo-area">
            <div class="logo-text">triview.</div>
            <div class="logo-sub">войти / создать профиль</div>
        </div>

        <div class="tab-switch">
            <button class="tab-btn active" id="tabLoginBtn">вход</button>
            <button class="tab-btn" id="tabRegisterBtn">регистрация</button>
        </div>

        <!-- ФОРМА ВХОДА (username + пароль) -->
        <div id="loginForm" class="auth-form">
            <input type="text" class="input-field" id="loginUsername" placeholder="юзернейм" autocomplete="off" maxlength="20">
            <input type="password" class="input-field" id="loginPassword" placeholder="пароль">
            <button class="action-btn" id="loginActionBtn">войти</button>
        </div>

        <!-- ФОРМА РЕГИСТРАЦИИ (username + пароль) -->
        <div id="registerForm" class="auth-form hidden-form">
            <input type="text" class="input-field" id="regUsername" placeholder="юзернейм" autocomplete="off" maxlength="20">
            <!-- подсказка убрана полностью -->
            <input type="password" class="input-field" id="regPassword" placeholder="пароль">
            <button class="action-btn" id="registerActionBtn">зарегистрироваться</button>
        </div>

        <!-- единый блок сообщений -->
        <div class="message-block" id="globalMessage">
            введите юзернейм и пароль
        </div>
        
        <!-- вместо terms теперь Skip с красивым нажатием -->
        <div class="skip-text" id="skipBtn">Skip</div>
    </div>

    <script>
        (function() {
            // ========== РАБОТА С ХРАНИЛИЩЕМ (localStorage) ==========
            const USERS_KEY = 'triview_users';
            
            function getUsers() {
                const data = localStorage.getItem(USERS_KEY);
                return data ? JSON.parse(data) : [];
            }

            function saveUsers(users) {
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }

            function findUserByUsername(username) {
                const users = getUsers();
                return users.find(u => u.username.toLowerCase() === username.toLowerCase());
            }

            function addUser(username, password) {
                const users = getUsers();
                users.push({ username, password });
                saveUsers(users);
            }

            // ========== ЭЛЕМЕНТЫ ==========
            const tabLogin = document.getElementById('tabLoginBtn');
            const tabRegister = document.getElementById('tabRegisterBtn');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const globalMsg = document.getElementById('globalMessage');
            const skipBtn = document.getElementById('skipBtn');

            const loginUsername = document.getElementById('loginUsername');
            const loginPassword = document.getElementById('loginPassword');
            const loginAction = document.getElementById('loginActionBtn');

            const regUsername = document.getElementById('regUsername');
            const regPassword = document.getElementById('regPassword');
            const regAction = document.getElementById('registerActionBtn');

            // ========== УТИЛИТЫ ==========
            function showMessage(text, isSuccess = false) {
                globalMsg.textContent = text;
                globalMsg.classList.toggle('success', isSuccess);
            }

            function clearInputError() {
                [loginUsername, loginPassword, regUsername, regPassword].forEach(i => i.classList.remove('error'));
            }

            function isValidUsername(str) {
                if (!str || str.length > 20) return false;
                return /^[a-zA-Z0-9_]+$/.test(str);
            }

            // ========== ПЕРЕКЛЮЧЕНИЕ ТАБОВ ==========
            tabLogin.addEventListener('click', () => {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                loginForm.classList.remove('hidden-form');
                registerForm.classList.add('hidden-form');
                clearInputError();
                showMessage('введите юзернейм и пароль');
            });

            tabRegister.addEventListener('click', () => {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                registerForm.classList.remove('hidden-form');
                loginForm.classList.add('hidden-form');
                clearInputError();
                showMessage('придумайте юзернейм и пароль');
            });

            // ========== РЕГИСТРАЦИЯ ==========
            regAction.addEventListener('click', (e) => {
                e.preventDefault();
                clearInputError();

                const username = regUsername.value.trim();
                const password = regPassword.value.trim();

                if (!username || !password) {
                    showMessage('заполните все поля');
                    if (!username) regUsername.classList.add('error');
                    if (!password) regPassword.classList.add('error');
                    return;
                }

                if (!isValidUsername(username)) {
                    showMessage('юзернейм может содержать только a-z, 0-9, _ (макс. 20)');
                    regUsername.classList.add('error');
                    return;
                }

                const existing = findUserByUsername(username);
                if (existing) {
                    showMessage('такой юзернейм уже занят');
                    regUsername.classList.add('error');
                    return;
                }

                addUser(username, password);
                showMessage(`✅ пользователь ${username} создан!`, true);
                
                regUsername.value = '';
                regPassword.value = '';

                setTimeout(() => {
                    tabLogin.click();
                    loginUsername.value = username;
                }, 1200);
            });

            // ========== ВХОД ==========
            loginAction.addEventListener('click', (e) => {
                e.preventDefault();
                clearInputError();

                const username = loginUsername.value.trim();
                const password = loginPassword.value.trim();

                if (!username || !password) {
                    showMessage('введите юзернейм и пароль');
                    if (!username) loginUsername.classList.add('error');
                    if (!password) loginPassword.classList.add('error');
                    return;
                }

                const user = findUserByUsername(username);
                if (!user) {
                    showMessage('пользователь не найден');
                    loginUsername.classList.add('error');
                    return;
                }

                if (user.password !== password) {
                    showMessage('неверный пароль');
                    loginPassword.classList.add('error');
                    return;
                }

                showMessage(`✨ добро пожаловать, ${user.username}!`, true);
                
                loginUsername.value = '';
                loginPassword.value = '';

                setTimeout(() => {
                    showMessage('выполнен вход (демо-режим)', true);
                }, 1500);
            });

            // ========== SKIP ==========
            skipBtn.addEventListener('click', () => {
                // красивая анимация уже в CSS :active
                showMessage('👋 пропуск (демо-режим)', true);
                // можно добавить легкую вибрацию идеи
                skipBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    skipBtn.style.transform = 'scale(1)';
                }, 150);
            });

            // ========== ОГРАНИЧЕНИЕ ВВОДА ==========
            [regUsername, loginUsername].forEach(field => {
                field.addEventListener('input', function() {
                    this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '');
                });
            });

            showMessage('введите юзернейм и пароль');
        })();
    </script>
</body>
</html>
