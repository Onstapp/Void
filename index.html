<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>огонёк · серия</title>
    <style>
        /* Чёрно-белая эстетика — минимум оттенков, только свет и тень */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;  /* глубокий чёрный фон */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            line-height: 1.5;
            padding: 1.25rem;
        }

        .card {
            background: #0f0f0f;  /* почти чёрный, но с лёгкой текстурой */
            border: 2px solid #2a2a2a;
            box-shadow: 0 25px 50px -12px rgba(255, 255, 255, 0.05);
            max-width: 680px;
            width: 100%;
            padding: 2.5rem 2rem;
            border-radius: 64px 64px 48px 48px;
            transition: border 0.2s ease;
        }

        /* Лёгкое свечение при фокусе / ховере — только белое */
        .card:focus-within {
            border-color: #7a7a7a;
        }

        /* заголовок и описание */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 1px dashed #2f2f2f;
            padding-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #f0f0f0;
            margin-bottom: 0.4rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .header .sub {
            font-size: 1rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #7a7a7a;
            margin-top: 0.2rem;
            word-spacing: 2px;
        }

        /* центр — огонёк и число */
        .fire-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0 2.5rem 0;
        }

        .flame-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s cubic-bezier(0.2, 1.2, 0.8, 1);
        }

        .flame-wrapper:active {
            transform: scale(0.94);
        }

        /* большое число над огоньком */
        .series-count {
            font-size: 7rem;
            font-weight: 500;
            line-height: 1;
            color: #f5f5f5;
            margin-bottom: 0.2rem;
            font-feature-settings: "tnum";
            letter-spacing: -4px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transition: text-shadow 0.2s;
        }

        /* сам огонёк – графичный, чёрно-белый, похож на пламя/иконку */
        .flame-icon {
            width: 110px;
            height: 110px;
            background: #1f1f1f;
            border-radius: 50% 30% 50% 30% / 40% 40% 40% 40%;
            border: 3px solid #5a5a5a;
            box-shadow: 
                0 0 0 2px #0a0a0a,
                0 0 0 5px #2a2a2a,
                inset 0 -6px 0 #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            position: relative;
        }

        /* стилизованное изображение языка пламени (чистая геометрия) */
        .flame-icon::before {
            content: "";
            display: block;
            width: 40px;
            height: 55px;
            background: #e0e0e0;
            border-radius: 70% 20% 60% 30% / 50% 40% 50% 30%;
            transform: rotate(-5deg) translateY(-4px);
            box-shadow: 0 0 15px #9f9f9f;
            border: 1px solid #b0b0b0;
            transition: background 0.2s, box-shadow 0.2s;
        }

        /* дополнительная искра (маленький блик) */
        .flame-icon::after {
            content: "";
            position: absolute;
            top: 20px;
            right: 24px;
            width: 14px;
            height: 14px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 0 2px #6a6a6a;
            opacity: 0.5;
        }

        /* ежедневная подсказка */
        .daily-note {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6f6f6f;
            border: 1px solid #2b2b2b;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            margin-top: 2.5rem;
            display: inline-block;
            background: #0a0a0a;
            font-weight: 300;
        }

        /* прогресс и статистика */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #242424;
            padding-top: 2rem;
            margin-top: 1rem;
            font-size: 1.25rem;
            font-weight: 350;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stat-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #6b6b6b;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 400;
            color: #f0f0f0;
            line-height: 1;
        }

        .reminder {
            font-size: 0.9rem;
            color: #5a5a5a;
            background: #0c0c0c;
            padding: 0.4rem 0.9rem;
            border-radius: 100px;
            border: 1px solid #303030;
        }

        /* кнопка сброса (малозаметная, чисто для демо) */
        .reset-button {
            background: none;
            border: 1px solid #3a3a3a;
            color: #8a8a8a;
            padding: 0.4rem 1.2rem;
            border-radius: 36px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.1s;
            margin-top: 1.8rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .reset-button:hover {
            border-color: #a0a0a0;
            color: #dddddd;
            background: #1b1b1b;
        }

        /* сообщение о поддержке */
        .toast-message {
            background: #1d1d1d;
            border: 1px solid #4a4a4a;
            color: #cccccc;
            padding: 0.6rem 1.8rem;
            border-radius: 120px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            opacity: 0;
            transition: opacity 0.2s;
            height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-message.show {
            opacity: 1;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #3d3d3d;
            margin-top: 2rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>СЕРИЯ</h1>
            <div class="sub">ЕЖЕДНЕВНЫЙ ОГОНЬ</div>
        </div>

        <!-- зона огня и числа -->
        <div class="fire-container">
            <!-- число над огоньком (растёт с каждым днём) -->
            <div class="series-count" id="seriesCounter">0</div>

            <!-- кликабельная зона огонька -->
            <div class="flame-wrapper" id="flameButton" role="button" tabindex="0" aria-label="поддержать серию">
                <div class="flame-icon"></div>
            </div>

            <!-- сообщение-фидбек после клика -->
            <div class="toast-message" id="feedbackMessage">➕ огонь поддержан</div>

            <div class="daily-note">✦ заходи каждый день ✦</div>
        </div>

        <!-- небольшая статистика: текущая серия и сколько осталось до новой ступени -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">дней подряд</span>
                <span class="stat-value" id="streakDisplay">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">пик</span>
                <span class="stat-value" id="peakDisplay">0</span>
            </div>
            <div class="reminder" id="nextMilestone">⚡ до 5</div>
        </div>

        <!-- скромная кнопка сброса (для тестирования; обнуляет серию) -->
        <button class="reset-button" id="resetBtn">⟲ обнулить серию</button>
        <footer>BLACK & WHITE · СЕРИЯ</footer>
    </div>

    <script>
        (function() {
            // ------------------------- ЧЁРНО-БЕЛАЯ ЛОГИКА -------------------------
            // ключи для localStorage
            const STORAGE_KEY = 'fire_series_data';
            const LAST_DATE_KEY = 'fire_last_click_date';

            // данные по умолчанию
            let currentStreak = 0;         // текущая серия (сколько дней подряд жали)
            let maxStreak = 0;              // рекордная серия
            let seriesCounter = 0;           // число над огоньком (может расти с каждым подтверждённым днём)

            // элементы интерфейса
            const seriesEl = document.getElementById('seriesCounter');
            const streakEl = document.getElementById('streakDisplay');
            const peakEl = document.getElementById('peakDisplay');
            const nextMilestoneEl = document.getElementById('nextMilestone');
            const flameBtn = document.getElementById('flameButton');
            const feedbackEl = document.getElementById('feedbackMessage');
            const resetBtn = document.getElementById('resetBtn');

            // вспомогательная функция форматирования даты (YYYY-MM-DD)
            function getTodayString() {
                const d = new Date();
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            // загрузка из localStorage
            function loadData() {
                try {
                    const savedData = localStorage.getItem(STORAGE_KEY);
                    if (savedData) {
                        const parsed = JSON.parse(savedData);
                        // валидные поля
                        if (typeof parsed.currentStreak === 'number') currentStreak = parsed.currentStreak;
                        if (typeof parsed.maxStreak === 'number') maxStreak = parsed.maxStreak;
                        if (typeof parsed.seriesCounter === 'number') seriesCounter = parsed.seriesCounter;
                    }

                    // проверка последнего визита (чтобы при обновлении страницы не начислялся лишний день)
                    // инит не начисляет автоматически — только при клике.
                } catch (e) {
                    console.warn('error loading data', e);
                }
            }

            // сохраняем все данные
            function saveData() {
                const data = {
                    currentStreak: currentStreak,
                    maxStreak: maxStreak,
                    seriesCounter: seriesCounter,
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            // сохраняем дату последнего клика
            function saveLastClickDate(dateString) {
                localStorage.setItem(LAST_DATE_KEY, dateString);
            }

            // получаем последнюю дату клика
            function getLastClickDate() {
                return localStorage.getItem(LAST_DATE_KEY);
            }

            // обновить интерфейс (число, статистика, миникальный текст)
            function refreshUI() {
                // число над огоньком
                seriesEl.textContent = seriesCounter;

                // отображение серии и пика
                streakEl.textContent = currentStreak;
                peakEl.textContent = maxStreak;

                // следующий рубеж (ближайшее кратное 5, но не меньше currentStreak+1)
                let nextStep = 5;
                if (currentStreak < 5) {
                    nextStep = 5;
                } else {
                    // ищем ближайшее кратное 5 больше текущей серии
                    const remainder = currentStreak % 5;
                    if (remainder === 0) {
                        nextStep = currentStreak + 5;  // если ровно 5,10 — следующий через 5
                    } else {
                        nextStep = currentStreak + (5 - remainder);
                    }
                }
                nextMilestoneEl.textContent = `⚡ до ${nextStep}`;

                // динамическое изменение тона (в рамках ч/б)
                // ничего не делаем, всё остаётся строгим.
            }

            // показать фидбек
            function showFeedback(text) {
                feedbackEl.textContent = text;
                feedbackEl.classList.add('show');
                clearTimeout(window.feedbackTimeout);
                window.feedbackTimeout = setTimeout(() => {
                    feedbackEl.classList.remove('show');
                }, 1200);
            }

            // основная функция: поддержать серию (клик на огонёк)
            function supportFire() {
                const today = getTodayString();
                const lastDate = getLastClickDate();

                // если сегодня уже кликали
                if (lastDate === today) {
                    showFeedback('✧ уже сегодня поддерживал ✧');
                    return;  // ничего не меняем
                }

                // проверяем, был ли клик вчера
                let yesterday = '';
                const d = new Date();
                d.setDate(d.getDate() - 1);
                const yYear = d.getFullYear();
                const yMonth = String(d.getMonth() + 1).padStart(2, '0');
                const yDay = String(d.getDate()).padStart(2, '0');
                yesterday = `${yYear}-${yMonth}-${yDay}`;

                // если lastDate отсутствует (первый клик вообще) или lastDate === yesterday → серия продолжается
                if (!lastDate) {
                    // первый запуск
                    currentStreak = 1;
                    seriesCounter = 1;   // начинаем с 1
                } 
                else if (lastDate === yesterday) {
                    // продолжаем серию: увеличиваем и серию, и счётчик над огоньком
                    currentStreak += 1;
                    seriesCounter += 1;   // число над огоньком увеличивается каждый день поддержки
                } 
                else {
                    // иначе — серия сброшена (пропущен хотя бы один день)
                    currentStreak = 1;
                    // однако seriesCounter: вы сказали "чем больше ежедневно поддерживаешь, тем больше число над огоньком"
                    // логично, что при сбросе число не обнуляется полностью, а остаётся или уменьшается?
                    // по здравому смыслу: если серия оборвалась, число над огоньком должно стать меньше? 
                    // Но в описании: "чем больше ты ежедневно поддерживаешь серию тем больше число".
                    // Т.е. число — это по сути награда за постоянство. При срыве число не растёт, но падать не должно? 
                    // Я решаю так: при сбросе серии число над огоньком не сбрасывается, а остаётся прежним (как накопленный тотал поддержек),
                    // но можно интерпретировать иначе. Давайте сделаем: при сбросе серии число над огоньком замораживается 
                    // (остаётся тем же), а новая серия начинает копить уже поверх? Нет, лучше сохранить текущее число.
                    // Чтобы сохранить мотивацию — оставим seriesCounter неизменным. 
                    // (ни в коем случае не уменьшаем — это память о всех поддержках)
                    // но серия (streak) сбрасывается на 1.
                    // Для чистоты — серия сброшена, но число остается. Так что seriesCounter += 0? 
                    // но тогда сегодня мы нажали — число должно вырасти? Все же клик есть.
                    // При пропуске: мы кликаем сегодня, серия начинается заново с 1. А число увеличится на 1? логично.
                    seriesCounter += 1;   // всё равно поддержка, число растёт всегда с каждым реальным днём клика
                }

                // дополнительно: если мы сегодня первый раз (независимо от условий), нужно увеличить счётчик?
                // но мы уже увеличили в блоках. Проверим крайний случай: если lastDate существует, но не yesterday и не today.
                // уже обработано: else увеличили seriesCounter и поставили серию = 1.
                // Однако если серия сброшена, мы должны увеличить maxStreak? проверка ниже.

                // обновляем пиковую серию
                if (currentStreak > maxStreak) {
                    maxStreak = currentStreak;
                }

                // записываем сегодняшнюю дату клика
                saveLastClickDate(today);
                // сохраняем данные
                saveData();

                // обновляем интерфейс
                refreshUI();

                // фидбек
                showFeedback(`🔥 серия ${currentStreak} день`);
            }

            // сброс (для тестирования, работает мягко: обнуляет серию и счётчик, но можно сбросить всё)
            function resetSeries() {
                if (confirm('Обнулить всю статистику и серию? число над огоньком станет 0.')) {
                    currentStreak = 0;
                    maxStreak = 0;
                    seriesCounter = 0;
                    // очищаем дату последнего клика, чтобы начать с чистого листа
                    localStorage.removeItem(LAST_DATE_KEY);
                    saveData();  // сохранили нули
                    refreshUI();
                    showFeedback('⚪ серия обнулена');
                }
            }

            // инициализация: загрузить данные, восстановить дату, проверить, не устарела ли серия при загрузке (если юзер не заходил вчера, но открыл страницу — серия должна быть сброшена? 
            // однако логичнее, что при загрузке страницы без клика мы не должны автоматически сбрасывать серию.
            // серия меняется только при клике. Поэтому просто показываем сохранённые цифры.
            // Но нужно учесть: если последний клик был 3 дня назад, то currentStreak (например 5) остаётся в интерфейсе, 
            // но это ложь, так как серия уже прервана. Поэтому при загрузке необходимо проверить lastDate и сбросить streak, если был пропуск.
            // корректно: при загрузке сравниваем lastDate с сегодня и вчера.
            function checkAndFixStreakOnLoad() {
                const lastDate = getLastClickDate();
                if (!lastDate) return; // никогда не кликали — ок

                const today = getTodayString();
                const d = new Date();
                d.setDate(d.getDate() - 1);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const yesterday = `${y}-${m}-${day}`;

                // если lastDate не сегодня и не вчера, то серия прервана
                if (lastDate !== today && lastDate !== yesterday) {
                    // серия сброшена, но число остается (память)
                    currentStreak = 0;  // пока не кликнули заново, серия 0
                    maxStreak = Math.max(maxStreak, currentStreak); // но пик сохраняется 
                    // но currentStreak стал 0. сохраняем.
                    saveData(); 
                }
                // если lastDate === yesterday, то серия ещё актуальна (сегодня ещё не кликали, но если кликнут — увеличится)
                // если lastDate === today — значит сегодня уже кликали, но при перезагрузке оставляем currentStreak как есть.
                // дополнительные действия не нужны.
            }

            // первоначальная загрузка
            loadData();
            checkAndFixStreakOnLoad();
            refreshUI();

            // слушатель клика на огонёк
            flameBtn.addEventListener('click', function(e) {
                e.preventDefault();
                supportFire();
            });

            // поддержка клавиатуры (Enter или пробел)
            flameBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    supportFire();
                }
            });

            // кнопка сброса
            resetBtn.addEventListener('click', function() {
                resetSeries();
            });

            // сделать кнопку фокусируемой
            flameBtn.setAttribute('tabindex', '0');
        })();
    </script>
</body>
</html>
