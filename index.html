<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>огонь · серия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: #000000;
            font-family: 'SF Mono', 'Fira Code', 'Roboto Mono', 'Dank Mono', 'Source Code Pro', monospace;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            margin: 0 auto;
            text-align: center;
        }

        /* число — огромное, только суть */
        .counter {
            font-size: 15rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            color: #f0f0f0;
            line-height: 0.9;
            margin-bottom: 1rem;
            font-feature-settings: "tnum";
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        /* огонь — почти иероглиф */
        .flame {
            width: 140px;
            height: 140px;
            margin: 0 auto 2.5rem auto;
            background: #0f0f0f;
            border: none;
            border-radius: 50% 35% 45% 35%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 0 0 1px #2b2b2b;
        }

        .flame:hover {
            background: #151515;
            box-shadow: 0 0 0 1px #5a5a5a;
        }

        .flame:active {
            transform: scale(0.96);
            background: #1e1e1e;
        }

        /* внутренний язык — минимальный */
        .flame-inner {
            width: 48px;
            height: 68px;
            background: #e5e5e5;
            border-radius: 65% 20% 55% 25%;
            transform: rotate(-3deg) translateY(-3px);
            box-shadow: 0 0 30px #a0a0a0;
            transition: background 0.15s;
        }

        .flame:hover .flame-inner {
            background: #ffffff;
        }

        /* статистика одной строкой, без лишнего */
        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 2rem 0 2.5rem 0;
            font-size: 1.1rem;
            color: #5f5f5f;
            letter-spacing: 0.5px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #404040;
        }

        .stat-number {
            font-size: 1.8rem;
            color: #d0d0d0;
            font-weight: 350;
        }

        /* блок управления — чисто функциональный */
        .simulate {
            background: transparent;
            border: 1px solid #242424;
            color: #6f6f6f;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.7rem 1.8rem;
            border-radius: 0;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .simulate:hover {
            border-color: #5a5a5a;
            color: #cccccc;
            background: #0b0b0b;
        }

        .simulate:active {
            background: #151515;
        }

        /* фидбек микроскопический, почти незаметный */
        .feedback {
            height: 2rem;
            font-size: 0.7rem;
            color: #3f3f3f;
            letter-spacing: 1px;
            margin: 1rem 0 0 0;
            transition: color 0.1s;
        }

        .feedback.show {
            color: #8a8a8a;
        }

        /* скрытый сброс, только для порядка */
        .reset {
            background: none;
            border: none;
            color: #222;
            font-size: 0.6rem;
            cursor: pointer;
            margin-top: 2rem;
            padding: 0.2rem 0.5rem;
        }

        .reset:hover {
            color: #444;
        }

        /* всё предельно пусто */
    </style>
</head>
<body>
    <div class="app">
        <!-- только число, больше ничего -->
        <div class="counter" id="counter">0</div>

        <!-- огонь — кнопка поддержки -->
        <div class="flame" id="flameBtn" role="button" tabindex="0">
            <div class="flame-inner"></div>
        </div>

        <!-- минимум статистики: текущая / пик -->
        <div class="stats">
            <div class="stat">
                <span class="stat-label">сейчас</span>
                <span class="stat-number" id="currentStreak">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">макс</span>
                <span class="stat-number" id="maxStreak">0</span>
            </div>
        </div>

        <!-- симулятор перехода на день вперёд (только для теста) -->
        <button class="simulate" id="nextDayBtn">+1 день →</button>

        <!-- тихий фидбек -->
        <div class="feedback" id="feedback"></div>

        <!-- незаметный сброс (для чистоты) -->
        <button class="reset" id="resetBtn">пусто</button>
    </div>

    <script>
        (function() {
            // минимализм в коде
            const STREAK_KEY = 'fs_streak';
            const MAX_KEY = 'fs_max';
            const COUNT_KEY = 'fs_count';
            const DATE_KEY = 'fs_last';

            // элементы
            const counterEl = document.getElementById('counter');
            const currentEl = document.getElementById('currentStreak');
            const maxEl = document.getElementById('maxStreak');
            const flame = document.getElementById('flameBtn');
            const nextBtn = document.getElementById('nextDayBtn');
            const resetBtn = document.getElementById('resetBtn');
            const feedback = document.getElementById('feedback');

            // состояние
            let current = 0;      // текущая серия (дней подряд)
            let max = 0;          // пик
            let total = 0;        // число над огоньком (растёт с каждым днём клика)

            // ===== утилиты =====
            function getToday() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }

            function getDateShifted(daysOffset) {
                const d = new Date();
                d.setDate(d.getDate() + daysOffset);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }

            // загрузка
            function load() {
                try {
                    const s = localStorage.getItem(STREAK_KEY);
                    const m = localStorage.getItem(MAX_KEY);
                    const c = localStorage.getItem(COUNT_KEY);
                    if (s !== null) current = parseInt(s, 10) || 0;
                    if (m !== null) max = parseInt(m, 10) || 0;
                    if (c !== null) total = parseInt(c, 10) || 0;
                } catch (e) {}
            }

            // сохранение
            function persist() {
                localStorage.setItem(STREAK_KEY, current.toString());
                localStorage.setItem(MAX_KEY, max.toString());
                localStorage.setItem(COUNT_KEY, total.toString());
            }

            // обновить UI
            function render() {
                counterEl.textContent = total;
                currentEl.textContent = current;
                maxEl.textContent = max;
            }

            // показать тихое сообщение
            function whisper(text) {
                feedback.textContent = text;
                feedback.classList.add('show');
                clearTimeout(window.whisperTimer);
                window.whisperTimer = setTimeout(() => {
                    feedback.classList.remove('show');
                }, 700);
            }

            // проверить и скорректировать серию при загрузке (если lastDate устарела)
            function validateOnLoad() {
                const last = localStorage.getItem(DATE_KEY);
                if (!last) return; // никогда не кликали

                const today = getToday();
                const yesterday = getDateShifted(-1);

                // если последний клик не сегодня и не вчера — серия оборвана
                if (last !== today && last !== yesterday) {
                    current = 0;   // серия прервана
                    persist();
                }
                // если last === yesterday — серия жива, current оставляем
                // если last === today — current оставляем (уже кликнули сегодня)
            }

            // главная логика: поддержать огонь (клик)
            function supportFire(referenceDate = null) {
                const today = referenceDate || getToday(); // для симуляции можем подменить дату
                const last = localStorage.getItem(DATE_KEY);

                // если уже кликали сегодня (в эту дату) — ничего не делаем
                if (last === today) {
                    whisper('уже сегодня');
                    return;
                }

                const yesterday = getDateShifted(-1); // всегда вчера относительно реального времени? 
                // но для симуляции нужна подмена — поэтому вычисляем вчера относительно referenceDate
                let realYesterday;
                if (referenceDate) {
                    const d = new Date(referenceDate + 'T12:00:00'); // костыль для парсинга
                    d.setDate(d.getDate() - 1);
                    const y = d.getFullYear();
                    const m = String(d.getMonth()+1).padStart(2,'0');
                    const day = String(d.getDate()).padStart(2,'0');
                    realYesterday = `${y}-${m}-${day}`;
                } else {
                    realYesterday = getDateShifted(-1);
                }

                // случай 1: первый клик вообще
                if (!last) {
                    current = 1;
                    total = 1;
                }
                // случай 2: продолжение (клик был вчера)
                else if (last === realYesterday) {
                    current += 1;
                    total += 1;
                }
                // случай 3: пропуск (кликали, но не вчера) — серия сбрасывается, но total растёт
                else {
                    current = 1;
                    total += 1;
                }

                // обновить максимум
                if (current > max) {
                    max = current;
                }

                // сохранить дату (реальную или симулированную)
                localStorage.setItem(DATE_KEY, today);
                persist();
                render();

                whisper(`+1 · ${current}`);
            }

            // симуляция следующего дня — вручную сдвигаем дату
            function simulateNextDay() {
                const lastDate = localStorage.getItem(DATE_KEY);
                let baseDate;

                if (!lastDate) {
                    // если ни разу не кликали — отсчитываем от сегодня
                    baseDate = getToday();
                } else {
                    baseDate = lastDate;
                }

                // парсим и прибавляем 1 день
                const d = new Date(baseDate + 'T12:00:00');
                d.setDate(d.getDate() + 1);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const nextDate = `${year}-${month}-${day}`;

                // выполняем поддержку с этой будущей датой
                supportFire(nextDate);
            }

            // сброс всего (без подтверждения, для минимализма)
            function resetEverything() {
                localStorage.removeItem(DATE_KEY);
                current = 0;
                max = 0;
                total = 0;
                persist();
                render();
                whisper('···');
            }

            // ===== инициализация =====
            load();
            validateOnLoad();
            render();

            // слушатели
            flame.addEventListener('click', () => supportFire());
            flame.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    supportFire();
                }
            });
            flame.setAttribute('tabindex', '0');

            nextBtn.addEventListener('click', simulateNextDay);
            resetBtn.addEventListener('click', resetEverything);
        })();
    </script>
</body>
</html>
