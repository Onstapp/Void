<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TriView · вход и регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b0710; /* глубокий тёмный фон */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* главный контейнер — как экран телефона, но мягче */
        .auth-frame {
            max-width: 400px;
            width: 100%;
            background: linear-gradient(165deg, #1e1029 0%, #2c1a38 70%, #3d2352 100%);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 2px #9f7aea33, 0 0 0 6px #1a0e22;
            overflow: hidden;
            padding: 32px 24px 40px 24px;
            position: relative;
            backdrop-filter: blur(2px);
        }

        /* декоративные фиолетовые блики */
        .auth-frame::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: #c084fc55;
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .auth-frame::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 250px;
            height: 250px;
            background: #a855f755;
            filter: blur(90px);
            border-radius: 50%;
            z-index: 0;
        }

        /* всё содержимое поверх бликов */
        .auth-content {
            position: relative;
            z-index: 2;
        }

        /* логотип / заголовок */
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 56px;
            filter: drop-shadow(0 8px 12px #3d1f5e);
            background: linear-gradient(135deg, #d8b4ff, #b47aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #c48aff;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(145deg, #f0dbff, #caa5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .logo-sub {
            color: #b38fdd;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* переключатель: вход / регистрация */
        .tab-switch {
            display: flex;
            background: #221530cc;
            backdrop-filter: blur(10px);
            border-radius: 100px;
            padding: 5px;
            margin-bottom: 28px;
            border: 1px solid #6a4790;
            box-shadow: inset 0 2px 5px #0f0a15;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 600;
            font-size: 18px;
            color: #bba3db;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            backdrop-filter: blur(4px);
        }

        .tab-btn.active {
            background: #9e72da;
            color: white;
            box-shadow: 0 6px 14px #602e9b, 0 0 0 1px #dbb6ff;
        }

        /* универсальная форма (и login и register) */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 28px;
        }

        /* скрытая форма */
        .hidden-form {
            display: none;
        }

        /* поле ввода */
        .input-field {
            width: 100%;
            background: #2d1d3ee0;
            border: 1.5px solid #6b4993;
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 18px 24px;
            font-size: 16px;
            color: #f0e2ff;
            outline: none;
            transition: 0.2s;
        }

        .input-field:focus {
            border-color: #cc9eff;
            box-shadow: 0 0 0 4px #8f6acf55, 0 0 15px #cb9eff;
        }

        .input-field::placeholder {
            color: #a687c5;
            font-weight: 400;
        }

        /* дополнительные опции (запомнить / забыли пароль) */
        .row-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #bea4e3;
            font-size: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #b47aff;
            border-radius: 6px;
        }

        .forgot-link {
            color: #caabff;
            text-decoration: none;
            border-bottom: 1px dashed #a678d4;
        }

        .forgot-link:hover {
            color: #eaceff;
        }

        /* кнопка действия (войти / зарегистрироваться) */
        .action-btn {
            background: linear-gradient(95deg, #a16cf4, #d090ff);
            border: none;
            padding: 18px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.7px;
            cursor: pointer;
            box-shadow: 0 12px 25px #532e8d, 0 2px 0 0 #efd2ff inset;
            transition: 0.15s;
            margin-top: 8px;
        }

        .action-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 15px #401f6e;
        }

        /* разделитель "или" */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #a17ec2;
            font-size: 14px;
            margin: 16px 0 20px;
        }

        .divider-line {
            flex: 1;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, #ab80d5, #ab80d5, transparent);
        }

        /* вход через Google (стильно) */
        .social-btn {
            background: #2e1e3fdd;
            backdrop-filter: blur(12px);
            border: 1.5px solid #8a65b5;
            border-radius: 60px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #e7d2ff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .social-btn:hover {
            background: #3f2b57;
            border-color: #be97f0;
        }

        .social-icon {
            font-size: 26px;
        }

        /* сообщение об ошибке/успехе (демо) */
        .demo-message {
            margin-top: 24px;
            background: #1f142bb3;
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 16px 22px;
            text-align: center;
            color: #dcc3ff;
            font-size: 15px;
            border: 1px solid #b28aff;
            box-shadow: 0 5px 12px #1e1029;
        }

        .demo-message span {
            color: #f0c4ff;
            font-weight: 600;
        }

        /* мелкий текст внизу */
        .terms {
            text-align: center;
            color: #8f73b0;
            font-size: 13px;
            margin-top: 24px;
        }
        .terms a {
            color: #c5a4ff;
            text-decoration: none;
            border-bottom: 1px dotted #8b62b7;
        }

        /* анимации плавности */
        button, .tab-btn, .social-btn, .forgot-link {
            cursor: pointer;
            user-select: none;
        }

        /* скрыть стандартные галки */
        input[type="checkbox"] {
            filter: drop-shadow(0 0 4px #a06bd0);
        }

        /* placeholder */
        input:-webkit-autofill,
        input:-webkit-autofill:focus {
            transition: background-color 600000s 0s, color 600000s 0s;
        }
        input:-webkit-autofill {
            -webkit-text-fill-color: #f0d9ff !important;
            caret-color: white;
        }
    </style>
</head>
<body>
    <div class="auth-frame">
        <div class="auth-content">
            <!-- логотип -->
            <div class="logo-area">
                <div class="logo-icon">◈</div>
                <div class="logo-text">TriView</div>
                <div class="logo-sub">лента · фото · текст</div>
            </div>

            <!-- табы: вход / регистрация -->
            <div class="tab-switch" id="tabSwitch">
                <button class="tab-btn active" id="tabLoginBtn">Вход</button>
                <button class="tab-btn" id="tabRegisterBtn">Регистрация</button>
            </div>

            <!-- ========== ФОРМА ВХОДА (email) ========= -->
            <div id="loginForm" class="auth-form">
                <input type="email" class="input-field" placeholder="Электронная почта" id="loginEmail" value="demo@triview.ru">
                <input type="password" class="input-field" placeholder="Пароль" id="loginPassword" value="123456">
                
                <div class="row-options">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> Запомнить меня
                    </label>
                    <a href="#" class="forgot-link" id="fakeForgot">Не помню пароль</a>
                </div>

                <button class="action-btn" id="loginActionBtn">Войти</button>
            </div>

            <!-- ========== ФОРМА РЕГИСТРАЦИИ (email) ========= -->
            <div id="registerForm" class="auth-form hidden-form">
                <input type="email" class="input-field" placeholder="Электронная почта" id="regEmail" value="new@triview.ru">
                <input type="password" class="input-field" placeholder="Придумайте пароль" id="regPassword">
                <input type="password" class="input-field" placeholder="Повторите пароль" id="regPasswordConfirm">

                <label class="checkbox-label" style="margin: 5px 0 0 10px;">
                    <input type="checkbox" id="agreeCheck" checked> Я принимаю <a href="#" style="color:#ccaaff;">условия</a>
                </label>

                <button class="action-btn" id="registerActionBtn">Создать аккаунт</button>
            </div>

            <!-- разделитель или -->
            <div class="divider">
                <span class="divider-line"></span>
                <span>или</span>
                <span class="divider-line"></span>
            </div>

            <!-- кнопка google (для красоты) -->
            <button class="social-btn" id="googleMockBtn">
                <span class="social-icon">G</span>
                <span>Продолжить с Google</span>
            </button>

            <!-- демо-инфо (отзыв на действия) -->
            <div class="demo-message" id="demoMessage">
                <span>👋 демо</span> · введи любые данные, форма валидирует почту
            </div>

            <!-- мелкий текст -->
            <div class="terms">
                Нажимая кнопку, ты соглашаешься с <a href="#">правилами</a> и <a href="#">политикой</a>.
            </div>
        </div>
    </div>

    <script>
        (function() {
            // табы
            const tabLogin = document.getElementById('tabLoginBtn');
            const tabRegister = document.getElementById('tabRegisterBtn');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const demoMessage = document.getElementById('demoMessage');

            // поля для демо-проверки
            const loginEmail = document.getElementById('loginEmail');
            const loginPass = document.getElementById('loginPassword');
            const regEmail = document.getElementById('regEmail');
            const regPass = document.getElementById('regPassword');
            const regConfirm = document.getElementById('regPasswordConfirm');
            const agreeCheck = document.getElementById('agreeCheck');

            // переключение на ВХОД
            function showLogin() {
                loginForm.classList.remove('hidden-form');
                registerForm.classList.add('hidden-form');
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
            }

            // переключение на РЕГИСТРАЦИЮ
            function showRegister() {
                registerForm.classList.remove('hidden-form');
                loginForm.classList.add('hidden-form');
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
            }

            tabLogin.addEventListener('click', showLogin);
            tabRegister.addEventListener('click', showRegister);

            // простая валидация email
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            // очистка сообщения (чтоб не засорять)
            function setMessage(text, isGood = false) {
                demoMessage.innerHTML = `<span>${isGood ? '✅' : '👋'}</span> ${text}`;
            }

            // КНОПКА ВХОДА
            document.getElementById('loginActionBtn').addEventListener('click', (e) => {
                e.preventDefault();
                const email = loginEmail.value.trim();
                const pass = loginPass.value.trim();

                if (!email || !pass) {
                    setMessage('заполните почту и пароль');
                    return;
                }
                if (!isValidEmail(email)) {
                    setMessage('почта выглядит некорректно');
                    return;
                }
                if (pass.length < 3) {
                    setMessage('пароль слишком короткий (демо минимум 3 символа)');
                    return;
                }
                setMessage('✓ успешный вход (демо-режим)', true);
                // здесь можно добавить редирект или анимацию
            });

            // КНОПКА РЕГИСТРАЦИИ
            document.getElementById('registerActionBtn').addEventListener('click', (e) => {
                e.preventDefault();
                const email = regEmail.value.trim();
                const pass = regPass.value.trim();
                const confirm = regConfirm.value.trim();

                if (!email || !pass || !confirm) {
                    setMessage('заполни все поля');
                    return;
                }
                if (!isValidEmail(email)) {
                    setMessage('проверь формат почты');
                    return;
                }
                if (pass.length < 4) {
                    setMessage('пароль должен быть хотя бы 4 символа');
                    return;
                }
                if (pass !== confirm) {
                    setMessage('пароли не совпадают');
                    return;
                }
                if (!agreeCheck.checked) {
                    setMessage('нужно принять условия');
                    return;
                }
                setMessage('🎉 аккаунт создан (демо)', true);
                // здесь можно переключить на вход или что-то еще
            });

            // кнопка google просто уведомление
            document.getElementById('googleMockBtn').addEventListener('click', (e) => {
                e.preventDefault();
                setMessage('google oauth (демо-заглушка)', false);
            });

            // забыли пароль
            document.getElementById('fakeForgot').addEventListener('click', (e) => {
                e.preventDefault();
                setMessage('сброс пароля пока не реализован ✦ демо');
            });

            // красивое переключение: предзаполненные поля для демо
            // ничего лишнего не делаем
        })();
    </script>
</body>
</html>
